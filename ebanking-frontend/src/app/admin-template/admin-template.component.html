<div class="min-h-screen bg-gray-50 flex flex-col font-sans">
  <nav class="bg-gray-900 text-white shadow-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <div class="flex items-center">
          <div class="flex-shrink-0 font-bold text-xl tracking-tight flex items-center gap-2">
            <svg class="w-[46px] h-[46px] text-white-800 dark:text-white" aria-hidden="true"
              xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
              <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                d="M5 18h14M5 18v3h14v-3M5 18l1-9h12l1 9M16 6v3m-4-3v3m-2-6h8v3h-8V3Zm-1 9h.01v.01H9V12Zm3 0h.01v.01H12V12Zm3 0h.01v.01H15V12Zm-6 3h.01v.01H9V15Zm3 0h.01v.01H12V15Zm3 0h.01v.01H15V15Z" />
            </svg>
            <a routerLink="/admin/dashboard" routerLinkActive="bg-gray-800 text-white">
              e-banking
            </a>
          </div>
          <div class="hidden md:block">
            <div class="ml-10 flex items-baseline space-x-4">
              <a routerLink="/admin/customers" routerLinkActive="bg-gray-800 text-white"
                class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Customers</a>
              <a routerLink="/admin/accounts" routerLinkActive="bg-gray-800 text-white"
                class="text-gray-300 hover:bg-gray-700 hover:text-white px-3 py-2 rounded-md text-sm font-medium transition-colors">Accounts</a>
            </div>
          </div>
        </div>

        <div class="flex items-center gap-6">
          <div class="text-sm text-gray-400">
            Session: <span class="font-semibold text-white">{{ authService.username }}</span>
          </div>
          <button (click)="handleLogout()"
            class="bg-gray-800 hover:bg-black text-gray-300 hover:text-white px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 border border-gray-700 shadow-sm flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            Logout
          </button>
        </div>
      </div>
    </div>
  </nav>

  <main class="flex-1 w-full max-w-7xl mx-auto p-6 sm:p-8">
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 min-h-[500px]">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
