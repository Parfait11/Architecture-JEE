<div class="min-h-screen bg-[#F5F6F8] flex items-center justify-center p-6 font-sans">
  <div class="w-full max-w-sm">

    <div class="flex flex-col items-center mb-8">
      <div
        class="w-12 h-12 rounded-xl flex items-center justify-center shadow-sm mb-4"
        style="background: linear-gradient(135deg, #10294A 0%, #0F9D75 100%);"
      >
        <span class="text-white font-bold text-xl leading-none">e</span>
      </div>
      <h1 class="text-xl font-bold tracking-tight text-[#10294A]">e-banking</h1>
    </div>
    
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">
      <h2 class="text-lg font-bold text-gray-900 mb-1">Welcome back</h2>
      <p class="text-sm text-gray-500 mb-6">Sign in to manage your accounts.</p>

      <div
        *ngIf="errorMessage"
        class="mb-5 px-4 py-3 bg-[#FBEAE8] border border-[#F0C6C0] rounded-lg text-sm text-[#C1443C]"
      >
        {{ errorMessage }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="handleLogin()" class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1.5">Username</label>
          <input
            type="text"
            formControlName="username"
            autocomplete="username"
            class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#10294A] focus:border-transparent transition-all"
            placeholder="Your username"
          />
        </div>

        <div>
          <label class="block text-xs font-medium text-gray-500 mb-1.5">Password</label>
          <input
            type="password"
            formControlName="password"
            autocomplete="current-password"
            class="w-full px-3.5 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#10294A] focus:border-transparent transition-all"
            placeholder="••••••••"
          />
        </div>

        <button
          type="submit"
          [disabled]="isLoading || loginForm.invalid"
          class="w-full mt-2 bg-[#10294A] hover:bg-[#0A1D36] text-white text-sm font-medium py-2.5 rounded-lg shadow-sm transition-all duration-200 flex justify-center items-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed"
        >
          <svg
            *ngIf="isLoading"
            class="animate-spin h-4 w-4 text-white"
            fill="none"
            viewBox="0 0 24 24"
          >
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          {{ isLoading ? 'Signing in...' : 'Sign in' }}
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">Secure connection · e-banking</p>
  </div>
</div>
